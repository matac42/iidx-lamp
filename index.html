<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IIDX Lamp Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* デジタル庁デザインシステム カラー */
      --bg: #ffffff;
      --surface: #f5f8fa;
      --border: rgba(8, 19, 26, 0.14);
      --text: #08131a;
      --text-sub: #363f42;
      --text-dim: #5a656b;
      --accent: #32517d;
      --accent-light: #43709d;
      --accent-bg: #e3f4fb;
      --accent-surface: #bae2f4;

      /* ランプカラー（ライト背景用に調整） */
      --noplay: #9ca7ad;
      --failed: #b22323;
      --assist: #7b3fa0;
      --easy: #1e7b65;
      --clear: #32517d;
      --hard: #916626;
      --exhard: #ac7a2d;
      --fc: #c060a0;

      /* セマンティック */
      --success: #1e7b65;
      --danger: #b22323;
      --caution: #916626;

      /* スペーシング (8px base) */
      --sp-1: 8px;
      --sp-2: 16px;
      --sp-3: 24px;
      --sp-4: 32px;
      --sp-5: 40px;

      /* 角の形状 */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;

      /* レイアウト (デジタル庁: 768px breakpoint, 12col grid) */
      --content-max: 960px;
      --gutter: 16px;
      --margin: 16px;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      font-size: 16px;
      line-height: 1.75;
      letter-spacing: 0.02em;
    }

    /* ── Loading ── */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* ── Upload Screen ── */
    #upload-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: var(--sp-3);
      text-align: center;
    }

    #upload-screen h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.01em;
      margin-bottom: var(--sp-1);
    }

    #upload-screen .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: var(--sp-4);
    }

    .paste-area {
      width: 100%;
      max-width: 400px;
      margin-top: var(--sp-2);
    }

    .paste-area textarea {
      width: 100%;
      height: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Noto Sans Mono', monospace;
      font-size: 0.75rem;
      padding: var(--sp-2);
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }

    .paste-area textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }

    .paste-area textarea::placeholder { color: var(--text-dim); }

    .drop-zone {
      width: 100%;
      max-width: 400px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-3) var(--sp-2);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .drop-zone .label { color: var(--text-sub); font-size: 0.85rem; }

    .or-divider {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-top: var(--sp-2);
    }

    #file-input, #file-input-update { display: none; }

    #parse-error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: var(--sp-2);
      max-width: 400px;
    }

    /* ── Buttons (デジタル庁: 塗り / アウトライン / テキスト) ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 10px 24px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.15s, box-shadow 0.15s;
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .btn:hover { background: var(--accent-light); border-color: var(--accent-light); }
    .btn:active { background: #192738; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn-block { display: flex; justify-content: center; width: 100%; }

    .btn-sm {
      padding: 6px 16px;
      font-size: 0.75rem;
      min-height: 36px;
    }

    .btn-outline {
      background: var(--bg);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-outline:hover { background: var(--accent-bg); }

    /* ── Main App ── */
    #app { display: none; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .app-header-inner {
      max-width: calc(var(--content-max) + var(--margin) * 2);
      margin: 0 auto;
      padding: var(--sp-2) var(--margin) 0;
    }

    .app-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-actions {
      display: flex;
      gap: var(--sp-1);
      align-items: center;
    }

    .header-actions button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, border-color 0.15s;
    }

    .header-actions button:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Tab Navigation (top) ── */
    .tab-nav {
      display: flex;
      gap: 0;
      margin-top: var(--sp-1);
    }

    .tab-nav-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
    }

    .tab-nav-btn:hover { color: var(--text-sub); }

    .tab-nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Content ── */
    .tab-content {
      padding: var(--sp-2) var(--margin);
      max-width: calc(var(--content-max) + var(--margin) * 2);
      margin: 0 auto;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Summary Section ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gutter);
      margin-bottom: var(--sp-2);
    }

    .donut-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .donut-card .donut-title {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: var(--sp-1);
    }

    .donut-svg { width: 120px; height: 120px; }

    .donut-center-text {
      font-size: 1.4rem;
      font-weight: 700;
      fill: var(--text);
    }

    .donut-center-sub {
      font-size: 0.55rem;
      fill: var(--text-dim);
    }

    .key-numbers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gutter);
    }

    .key-num {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-2);
      text-align: center;
    }

    .key-num .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .key-num .label {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-1);
      margin: var(--sp-2) 0;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Grid View ── */
    .grid-controls {
      display: flex;
      gap: var(--sp-1);
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: var(--sp-2);
    }

    .grid-controls .search-input {
      flex: 1;
      min-width: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .grid-controls .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }

    .grid-controls .search-input::placeholder { color: var(--text-dim); }

    .sort-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      padding: 10px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }

    .sort-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }

    .grid-section {
      margin-bottom: var(--sp-2);
    }

    .grid-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: var(--sp-1) 0;
      user-select: none;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--sp-1);
    }

    .grid-section-header h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .grid-section-header .count {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .grid-section-header .toggle {
      color: var(--text-dim);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .grid-section-header .toggle.collapsed {
      transform: rotate(-90deg);
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
      gap: 3px;
    }

    .tile {
      aspect-ratio: 1;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      opacity: 0;
      animation: tileIn 0.3s ease forwards;
    }

    .tile:hover {
      transform: scale(1.3);
      box-shadow: 0 2px 8px rgba(8, 19, 26, 0.2);
      z-index: 2;
      position: relative;
    }

    @keyframes tileIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Tooltip (PC) ── */
    .tooltip {
      display: none;
      position: fixed;
      z-index: 100;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--sp-1) var(--sp-2);
      font-size: 0.8rem;
      max-width: 260px;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(8, 19, 26, 0.12);
    }

    .tooltip .tt-title {
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .tooltip .tt-meta {
      color: var(--text-dim);
      font-size: 0.7rem;
    }

    /* ── Popup (mobile) ── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(8, 19, 26, 0.4);
      align-items: flex-end;
      justify-content: center;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-content {
      background: var(--bg);
      border-top: 1px solid var(--border);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--sp-3) var(--sp-2) calc(var(--sp-3) + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .popup-content .popup-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: var(--sp-1);
      color: var(--text);
    }

    .popup-content .popup-meta {
      font-size: 0.85rem;
      color: var(--text-sub);
      line-height: 1.75;
    }

    .popup-content .popup-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }

    /* ── List View ── */
    .list-controls {
      display: flex;
      gap: var(--sp-1);
      flex-wrap: wrap;
      margin-bottom: var(--sp-1);
      align-items: center;
    }

    .list-controls .search-input {
      flex: 1;
      min-width: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .list-controls .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }

    .list-controls .search-input::placeholder { color: var(--text-dim); }

    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 6px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 5px 14px;
      font-size: 0.75rem;
      color: var(--text-sub);
      cursor: pointer;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      user-select: none;
      font-weight: 400;
    }

    .chip:hover {
      background: var(--surface);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .chip .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .chip.active .chip-dot {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.5);
    }

    .song-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .song-table th {
      text-align: left;
      padding: 10px 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      font-weight: 700;
      border-bottom: 2px solid var(--text);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    .song-table th:hover { color: var(--accent); }
    .song-table th .sort-arrow { margin-left: 2px; font-size: 0.6rem; }

    .song-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .song-table tbody tr:hover {
      background: var(--surface);
    }

    .song-table .lamp-cell {
      width: 60px;
    }

    .lamp-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .song-table .title-cell {
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-table .num-cell {
      text-align: right;
      font-family: 'Noto Sans Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .level-tag {
      background: var(--accent-bg);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .load-more-wrap {
      text-align: center;
      padding: var(--sp-2) 0;
    }

    .empty-state {
      text-align: center;
      padding: var(--sp-4) var(--sp-2);
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 700;
      z-index: 300;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Export Banner ── */
    .export-banner {
      display: none;
      background: var(--accent-bg);
      border: 1px solid var(--accent-surface);
      border-radius: var(--radius-sm);
      padding: var(--sp-2);
      margin: var(--sp-2) var(--sp-2) 0;
      font-size: 0.85rem;
      color: var(--text-sub);
      align-items: center;
      gap: var(--sp-1);
      flex-wrap: wrap;
    }

    .export-banner.show { display: flex; }

    .export-banner .btn { font-size: 0.75rem; padding: 6px 16px; min-height: 36px; }

    /* ── Responsive: デジタル庁 768px breakpoint ── */

    /* モバイル (<768px) */
    @media (max-width: 767px) {
      :root {
        --margin: 16px;
        --gutter: 12px;
      }

      .app-header h1 { font-size: 1rem; }

      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .donut-svg { width: 100px; height: 100px; }

      .donut-center-text { font-size: 1.2rem; }

      .key-num .val { font-size: 1.1rem; }
      .key-num { padding: var(--sp-1) var(--sp-2); }

      .grid-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .grid-controls .search-input { min-width: 100%; }

      .sort-select { width: 100%; }

      .song-table { font-size: 0.8rem; }
      .song-table th, .song-table td { padding: 8px 4px; }
      .song-table .title-cell { max-width: 120px; }

      /* スコア列をモバイルで非表示 */
      .song-table th:nth-child(5),
      .song-table td:nth-child(5) { display: none; }

      .list-controls .search-input { width: 100%; }

      .export-banner { margin: var(--sp-1) var(--margin) 0; }
    }

    /* デスクトップ (>=768px) */
    @media (min-width: 768px) {
      :root {
        --margin: 32px;
        --gutter: 24px;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
        gap: var(--gutter);
      }

      .donut-svg { width: 150px; height: 150px; }

      .donut-center-text { font-size: 1.6rem; }

      .key-num .val { font-size: 1.6rem; }

      .tile-grid {
        grid-template-columns: repeat(auto-fill, minmax(18px, 1fr));
        gap: 2px;
      }

      .song-table .title-cell { max-width: 320px; }

      .grid-section-header h3 { font-size: 1rem; }

      .export-banner {
        max-width: calc(var(--content-max) + var(--margin) * 2);
        margin: var(--sp-2) auto 0;
        padding: var(--sp-2) var(--margin);
      }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">読み込み中...</div>

<!-- Upload Screen (管理モード) -->

<script>
// ============================================================
// Constants
// ============================================================
const CLEAR_TYPES = [
  'NO PLAY', 'FAILED', 'ASSIST CLEAR', 'EASY CLEAR',
  'CLEAR', 'HARD CLEAR', 'EX HARD CLEAR', 'FULLCOMBO CLEAR'
];

const CLEAR_COLORS = {
  'NO PLAY': '#9ca7ad',
  'FAILED': '#b22323',
  'ASSIST CLEAR': '#7b3fa0',
  'EASY CLEAR': '#1e7b65',
  'CLEAR': '#32517d',
  'HARD CLEAR': '#916626',
  'EX HARD CLEAR': '#ac7a2d',
  'FULLCOMBO CLEAR': '#c060a0',
};

const CLEAR_SHORT = {
  'NO PLAY': 'NP',
  'FAILED': 'F',
  'ASSIST CLEAR': 'AC',
  'EASY CLEAR': 'EC',
  'CLEAR': 'C',
  'HARD CLEAR': 'HC',
  'EX HARD CLEAR': 'EXH',
  'FULLCOMBO CLEAR': 'FC',
};

const STORAGE_KEY = 'iidx_lamp_data';
const IS_TOUCH = 'ontouchstart' in window;
let allSongs = [];
let isOwner = false; // CSVインポートした場合 true

// ============================================================
// CSV Parser
// ============================================================
function parseCSV(text) {
  const rows = [];
  let i = 0;
  const len = text.length;
  while (i < len) {
    const row = [];
    while (i < len) {
      if (text[i] === '"') {
        i++;
        let field = '';
        while (i < len) {
          if (text[i] === '"') {
            if (i + 1 < len && text[i + 1] === '"') { field += '"'; i += 2; }
            else { i++; break; }
          } else { field += text[i]; i++; }
        }
        row.push(field);
        if (i < len && text[i] === ',') i++;
        else if (i < len && (text[i] === '\r' || text[i] === '\n')) {
          if (text[i] === '\r' && i + 1 < len && text[i + 1] === '\n') i += 2; else i++;
          break;
        }
      } else {
        let field = '';
        while (i < len && text[i] !== ',' && text[i] !== '\r' && text[i] !== '\n') { field += text[i]; i++; }
        row.push(field);
        if (i < len && text[i] === ',') i++;
        else {
          if (i < len && text[i] === '\r' && i + 1 < len && text[i + 1] === '\n') i += 2;
          else if (i < len) i++;
          break;
        }
      }
    }
    if (row.length > 1 || (row.length === 1 && row[0] !== '')) rows.push(row);
  }
  return rows;
}

function parseDifficultyBlock(cols, offset) {
  const levelStr = cols[offset];
  const level = levelStr && levelStr !== '0' ? parseInt(levelStr, 10) : null;
  if (!level) return null;
  const score = parseInt(cols[offset + 1], 10) || 0;
  const pgreat = parseInt(cols[offset + 2], 10) || 0;
  const great = parseInt(cols[offset + 3], 10) || 0;
  const missStr = cols[offset + 4];
  const miss = (missStr === '---' || missStr === '' || missStr == null) ? null : parseInt(missStr, 10);
  const clearType = (cols[offset + 5] || 'NO PLAY').trim();
  const djLevel = (cols[offset + 6] || '').trim();
  return { level, score, pgreat, great, miss, clearType, djLevel };
}

function processCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error('CSVデータが不足しています');
  const songs = [];
  for (let r = 1; r < rows.length; r++) {
    const cols = rows[r];
    if (cols.length < 40) continue;
    const version = cols[0];
    const title = cols[1];
    const genre = cols[2];
    const artist = cols[3];
    const playCount = parseInt(cols[4], 10) || 0;
    const another = parseDifficultyBlock(cols, 26);
    const leggendaria = parseDifficultyBlock(cols, 33);
    if (another && (another.level === 11 || another.level === 12)) {
      songs.push({ title, genre, artist, version, playCount, ...another, difficulty: 'ANOTHER', id: title + '_A' });
    }
    if (leggendaria && (leggendaria.level === 11 || leggendaria.level === 12)) {
      songs.push({ title, genre, artist, version, playCount, ...leggendaria, difficulty: 'LEGGENDARIA', id: title + '_L' });
    }
  }
  if (songs.length === 0) throw new Error('有効な曲データが見つかりませんでした');
  return songs;
}

// ============================================================
// Utility
// ============================================================
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function clearTypeIndex(ct) {
  return CLEAR_TYPES.indexOf(ct);
}

// ============================================================
// Data Loading
// ============================================================
async function init() {
  // Try data.json first
  try {
    const res = await fetch('data.json');
    if (res.ok) {
      const data = await res.json();
      allSongs = data.songs || data;
      isOwner = false;
      hideLoading();
      showApp();
      return;
    }
  } catch (e) { /* no data.json */ }

  // Try localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      allSongs = data.songs || [];
      if (allSongs.length > 0) {
        isOwner = true;
        hideLoading();
        showApp();
        return;
      }
    }
  } catch (e) { /* ignore */ }

  // Show upload screen
  hideLoading();
  showUploadScreen();
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

function showUploadScreen() {
  document.getElementById('upload-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (isOwner) {
    document.getElementById('btn-manage').style.display = '';
    document.getElementById('export-banner').classList.add('show');
  }
  renderSummary();
  initTabs();
  renderGrid();
  initListTab();
}

// ============================================================
// File Upload / Paste
// ============================================================
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const parseError = document.getElementById('parse-error');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
  parseError.textContent = '';
  const reader1 = new FileReader();
  reader1.onload = () => {
    try {
      const text = reader1.result;
      if (text.includes('\ufffd') || text.includes('\u00ef\u00bf\u00bd')) throw new Error('encoding');
      loadCSVText(text);
    } catch (e) {
      if (e.message === 'encoding') {
        const reader2 = new FileReader();
        reader2.onload = () => {
          try { loadCSVText(reader2.result); }
          catch (e2) { parseError.textContent = 'CSVの解析に失敗しました: ' + e2.message; }
        };
        reader2.readAsText(file, 'UTF-8');
      } else {
        parseError.textContent = 'CSVの解析に失敗しました: ' + e.message;
      }
    }
  };
  reader1.readAsText(file, 'Shift_JIS');
}

function loadCSVText(text) {
  allSongs = processCSV(text);
  isOwner = true;
  saveToStorage(allSongs);
  showApp();
}

document.getElementById('btn-paste-load').addEventListener('click', () => {
  parseError.textContent = '';
  const text = document.getElementById('csv-paste').value.trim();
  if (!text) { parseError.textContent = 'テキストが入力されていません'; return; }
  try { loadCSVText(text); }
  catch (e) { parseError.textContent = 'CSVの解析に失敗しました: ' + e.message; }
});

// CSV Update (from app header)
const fileInputUpdate = document.getElementById('file-input-update');
document.getElementById('btn-manage').addEventListener('click', () => fileInputUpdate.click());
fileInputUpdate.addEventListener('change', () => {
  if (fileInputUpdate.files.length) handleFile(fileInputUpdate.files[0]);
});

// ============================================================
// localStorage
// ============================================================
function saveToStorage(songs) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ songs, savedAt: new Date().toISOString() }));
  } catch (e) { /* ignore */ }
}

// ============================================================
// Export JSON
// ============================================================
document.getElementById('btn-export-json').addEventListener('click', () => {
  const data = { songs: allSongs, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('data.json をダウンロードしました');
});

// ============================================================
// Share
// ============================================================
document.getElementById('btn-share').addEventListener('click', () => {
  const s12 = allSongs.filter(s => s.level === 12);
  const s11 = allSongs.filter(s => s.level === 11);
  function stats(songs, label) {
    const total = songs.length;
    const played = songs.filter(s => s.clearType !== 'NO PLAY').length;
    const hard = songs.filter(s => ['HARD CLEAR', 'EX HARD CLEAR', 'FULLCOMBO CLEAR'].includes(s.clearType)).length;
    const failed = songs.filter(s => s.clearType === 'FAILED').length;
    const fc = songs.filter(s => s.clearType === 'FULLCOMBO CLEAR').length;
    const clearRate = total > 0 ? ((played / total) * 100).toFixed(1) : '0.0';
    let text = `${label}: ${played}/${total} (${clearRate}%)`;
    text += `\n  HC+: ${hard} | FAILED: ${failed}`;
    if (fc > 0) text += ` | FC: ${fc}`;
    return text;
  }
  const text = `IIDX Lamp Status\n${stats(s12, '☆12')}\n${stats(s11, '☆11')}`;
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
});

// ============================================================
// Tab Navigation
// ============================================================
function initTabs() {
  document.querySelectorAll('.tab-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
}

// ============================================================
// Summary: Donut Charts + Key Numbers
// ============================================================
function renderSummary() {
  const container = document.getElementById('summary-section');
  const s12 = allSongs.filter(s => s.level === 12);
  const s11 = allSongs.filter(s => s.level === 11);

  const played12 = s12.filter(s => s.clearType !== 'NO PLAY').length;
  const played11 = s11.filter(s => s.clearType !== 'NO PLAY').length;
  const hard12 = s12.filter(s => ['HARD CLEAR', 'EX HARD CLEAR', 'FULLCOMBO CLEAR'].includes(s.clearType)).length;
  const hard11 = s11.filter(s => ['HARD CLEAR', 'EX HARD CLEAR', 'FULLCOMBO CLEAR'].includes(s.clearType)).length;
  const failed12 = s12.filter(s => s.clearType === 'FAILED').length;
  const failed11 = s11.filter(s => s.clearType === 'FAILED').length;

  function makeDonutSVG(songs, id) {
    const total = songs.length;
    if (total === 0) return '<svg class="donut-svg" viewBox="0 0 120 120"></svg>';
    const played = songs.filter(s => s.clearType !== 'NO PLAY').length;
    const rate = ((played / total) * 100).toFixed(1);
    const counts = {};
    CLEAR_TYPES.forEach(ct => counts[ct] = 0);
    songs.forEach(s => counts[s.clearType]++);

    const R = 48, cx = 60, cy = 60;
    const C = 2 * Math.PI * R;
    let offset = 0;
    let paths = '';
    // Draw in reverse order so higher clears are on top visually
    for (const ct of [...CLEAR_TYPES].reverse()) {
      const count = counts[ct];
      if (count === 0) continue;
      const pct = count / total;
      const len = pct * C;
      paths += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${CLEAR_COLORS[ct]}" stroke-width="12" stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" class="donut-seg" data-id="${id}"/>`;
      offset += len;
    }

    return `<svg class="donut-svg" viewBox="0 0 120 120">
      ${paths}
      <text x="${cx}" y="${cy - 2}" text-anchor="middle" dominant-baseline="central" class="donut-center-text">${rate}%</text>
      <text x="${cx}" y="${cy + 14}" text-anchor="middle" class="donut-center-sub">${played}/${total}</text>
    </svg>`;
  }

  container.innerHTML = `
    <div class="summary">
      <div class="donut-card">
        <div class="donut-title">☆12</div>
        ${makeDonutSVG(s12, 'd12')}
      </div>
      <div class="donut-card">
        <div class="donut-title">☆11</div>
        ${makeDonutSVG(s11, 'd11')}
      </div>
    </div>
    <div class="key-numbers">
      <div class="key-num"><div class="val">${played12 + played11}</div><div class="label">プレイ済み</div></div>
      <div class="key-num"><div class="val" style="color:#916626">${hard12 + hard11}</div><div class="label">HC以上</div></div>
      <div class="key-num"><div class="val" style="color:#b22323">${failed12 + failed11}</div><div class="label">FAILED</div></div>
    </div>
    <div class="legend" id="legend"></div>
  `;

  // Legend
  document.getElementById('legend').innerHTML = CLEAR_TYPES.map(ct =>
    `<div class="legend-item"><div class="legend-dot" style="background:${CLEAR_COLORS[ct]}"></div>${CLEAR_SHORT[ct]}</div>`
  ).join('');

  // Donut animation
  requestAnimationFrame(() => {
    document.querySelectorAll('.donut-seg').forEach((seg, i) => {
      seg.style.opacity = '0';
      seg.style.transition = `opacity 0.4s ease ${i * 0.05}s`;
      requestAnimationFrame(() => { seg.style.opacity = '1'; });
    });
  });
}

// ============================================================
// Grid View
// ============================================================
let gridSort = 'title';
let gridSearch = '';

function getSortedSongs(songs) {
  const sorted = [...songs];
  if (gridSort === 'lamp') {
    sorted.sort((a, b) => clearTypeIndex(b.clearType) - clearTypeIndex(a.clearType) || a.title.localeCompare(b.title, 'ja'));
  } else if (gridSort === 'version') {
    sorted.sort((a, b) => a.version.localeCompare(b.version) || a.title.localeCompare(b.title, 'ja'));
  } else {
    sorted.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
  }
  return sorted;
}

function renderGrid() {
  const container = document.getElementById('grid-container');
  const q = gridSearch.toLowerCase();

  const sections = [
    { key: '12A', label: '☆12 ANOTHER', songs: allSongs.filter(s => s.level === 12 && s.difficulty === 'ANOTHER') },
    { key: '12L', label: '☆12 LEGGENDARIA', songs: allSongs.filter(s => s.level === 12 && s.difficulty === 'LEGGENDARIA') },
    { key: '11A', label: '☆11 ANOTHER', songs: allSongs.filter(s => s.level === 11 && s.difficulty === 'ANOTHER') },
    { key: '11L', label: '☆11 LEGGENDARIA', songs: allSongs.filter(s => s.level === 11 && s.difficulty === 'LEGGENDARIA') },
  ];

  let html = '';
  for (const sec of sections) {
    let songs = sec.songs;
    if (q) songs = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
    songs = getSortedSongs(songs);
    if (songs.length === 0 && q) continue;

    const collapsed = gridCollapsed[sec.key] ? 'collapsed' : '';

    html += `<div class="grid-section">
      <div class="grid-section-header" data-section="${sec.key}">
        <h3>${sec.label}</h3>
        <span class="count">${songs.length}曲</span>
        <span class="toggle ${collapsed}">▼</span>
      </div>`;

    if (!gridCollapsed[sec.key]) {
      html += `<div class="tile-grid">`;
      songs.forEach((s, i) => {
        const delay = Math.min(i * 2, 500);
        html += `<div class="tile" style="background:${CLEAR_COLORS[s.clearType]};animation-delay:${delay}ms" data-id="${escapeHtml(s.id)}"></div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  }

  container.innerHTML = html;

  // Section collapse toggles
  container.querySelectorAll('.grid-section-header').forEach(h => {
    h.addEventListener('click', () => {
      const key = h.dataset.section;
      gridCollapsed[key] = !gridCollapsed[key];
      renderGrid();
    });
  });

  // Tile interactions
  container.querySelectorAll('.tile').forEach(tile => {
    const song = allSongs.find(s => s.id === tile.dataset.id);
    if (!song) return;

    if (IS_TOUCH) {
      tile.addEventListener('click', () => showPopup(song));
    } else {
      tile.addEventListener('mouseenter', e => showTooltip(e, song));
      tile.addEventListener('mousemove', e => moveTooltip(e));
      tile.addEventListener('mouseleave', () => hideTooltip());
    }
  });
}

const gridCollapsed = {};

document.getElementById('grid-search').addEventListener('input', e => {
  gridSearch = e.target.value.trim();
  renderGrid();
});

document.getElementById('grid-sort').addEventListener('change', e => {
  gridSort = e.target.value;
  renderGrid();
});

// Tooltip
const tooltip = document.getElementById('tooltip');

function showTooltip(e, song) {
  const tt = tooltip;
  tt.querySelector('.tt-title').textContent = song.title;
  const missText = song.miss !== null ? `Miss: ${song.miss}` : '';
  const scoreText = song.score > 0 ? `Score: ${song.score}` : '';
  tt.querySelector('.tt-meta').textContent = `${CLEAR_SHORT[song.clearType]} | ☆${song.level}${song.difficulty === 'LEGGENDARIA' ? 'L' : 'A'} | ${missText} ${scoreText}`.trim();
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = tooltip;
  let x = e.clientX + 12;
  let y = e.clientY + 12;
  if (x + 260 > window.innerWidth) x = e.clientX - 260;
  if (y + 60 > window.innerHeight) y = e.clientY - 60;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// Popup (mobile)
const popupOverlay = document.getElementById('popup-overlay');

function showPopup(song) {
  const color = CLEAR_COLORS[song.clearType];
  const missText = song.miss !== null ? song.miss : '-';
  const diffTag = song.difficulty === 'LEGGENDARIA' ? 'L' : 'A';
  document.getElementById('popup-content').innerHTML = `
    <div class="popup-title">${escapeHtml(song.title)}</div>
    <div class="popup-meta">
      <span class="popup-badge" style="background:${color}">${CLEAR_SHORT[song.clearType]}</span>
      <span class="level-tag" style="margin-left:6px">☆${song.level} ${diffTag}</span>
      <br><br>
      Artist: ${escapeHtml(song.artist)}<br>
      Miss: ${missText}<br>
      Score: ${song.score || '-'}<br>
      Version: ${escapeHtml(song.version)}
    </div>
  `;
  popupOverlay.classList.add('show');
}

popupOverlay.addEventListener('click', e => {
  if (e.target === popupOverlay) popupOverlay.classList.remove('show');
});

// ============================================================
// List View
// ============================================================
let listState = {
  search: '',
  level: 'all',
  lamps: new Set(),
  sortKey: 'title',
  sortAsc: true,
  shown: 50,
};

function initListTab() {
  // Level filters
  const lRow = document.getElementById('level-filters');
  lRow.innerHTML = ['all', '12', '11'].map(v =>
    `<button class="chip ${v === 'all' ? 'active' : ''}" data-val="${v}">${v === 'all' ? 'ALL' : '☆' + v}</button>`
  ).join('');
  lRow.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    lRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    listState.level = chip.dataset.val;
    listState.shown = 50;
    renderList();
  });

  // Lamp filters
  const lampRow = document.getElementById('lamp-filters');
  lampRow.innerHTML = CLEAR_TYPES.map(ct =>
    `<button class="chip" data-val="${ct}"><span class="chip-dot" style="background:${CLEAR_COLORS[ct]}"></span>${CLEAR_SHORT[ct]}</button>`
  ).join('');
  lampRow.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const val = chip.dataset.val;
    if (listState.lamps.has(val)) {
      listState.lamps.delete(val);
      chip.classList.remove('active');
    } else {
      listState.lamps.add(val);
      chip.classList.add('active');
    }
    listState.shown = 50;
    renderList();
  });

  document.getElementById('list-search').addEventListener('input', e => {
    listState.search = e.target.value.trim().toLowerCase();
    listState.shown = 50;
    renderList();
  });

  document.getElementById('btn-list-more').addEventListener('click', () => {
    listState.shown += 50;
    renderList();
  });

  renderList();
}

function getFilteredListSongs() {
  let songs = [...allSongs];
  if (listState.level !== 'all') {
    const lv = parseInt(listState.level, 10);
    songs = songs.filter(s => s.level === lv);
  }
  if (listState.lamps.size > 0) {
    songs = songs.filter(s => listState.lamps.has(s.clearType));
  }
  if (listState.search) {
    const q = listState.search;
    songs = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
  }
  // Sort
  songs.sort((a, b) => {
    let cmp = 0;
    switch (listState.sortKey) {
      case 'title': cmp = a.title.localeCompare(b.title, 'ja'); break;
      case 'lamp': cmp = clearTypeIndex(a.clearType) - clearTypeIndex(b.clearType); break;
      case 'miss':
        if (a.miss === null && b.miss === null) cmp = 0;
        else if (a.miss === null) cmp = 1;
        else if (b.miss === null) cmp = -1;
        else cmp = a.miss - b.miss;
        break;
      case 'score': cmp = (a.score || 0) - (b.score || 0); break;
      case 'level':
        cmp = a.level - b.level;
        if (cmp === 0) cmp = (a.difficulty === 'LEGGENDARIA' ? 1 : 0) - (b.difficulty === 'LEGGENDARIA' ? 1 : 0);
        break;
    }
    return listState.sortAsc ? cmp : -cmp;
  });
  return songs;
}

function renderList() {
  const songs = getFilteredListSongs();
  const shown = songs.slice(0, listState.shown);
  const container = document.getElementById('list-container');

  if (shown.length === 0) {
    container.innerHTML = '<div class="empty-state">該当曲なし</div>';
    document.getElementById('list-more-wrap').style.display = 'none';
    return;
  }

  function sortHeader(key, label) {
    const arrow = listState.sortKey === key ? (listState.sortAsc ? '▲' : '▼') : '';
    return `<th data-sort="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  let html = `<table class="song-table">
    <thead><tr>
      ${sortHeader('lamp', 'ランプ')}
      ${sortHeader('title', '曲名')}
      ${sortHeader('level', 'Lv')}
      ${sortHeader('miss', 'ミス')}
      ${sortHeader('score', 'スコア')}
    </tr></thead><tbody>`;

  for (const s of shown) {
    const color = CLEAR_COLORS[s.clearType];
    const diffTag = s.difficulty === 'LEGGENDARIA' ? 'L' : 'A';
    const missText = s.miss !== null ? s.miss : '-';
    const scoreText = s.score > 0 ? s.score : '-';
    html += `<tr>
      <td class="lamp-cell"><span class="lamp-badge" style="background:${color}">${CLEAR_SHORT[s.clearType]}</span></td>
      <td class="title-cell" title="${escapeHtml(s.title)}">${escapeHtml(s.title)}</td>
      <td><span class="level-tag">☆${s.level}${diffTag}</span></td>
      <td class="num-cell">${missText}</td>
      <td class="num-cell">${scoreText}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  container.innerHTML = html;

  // Sort click handlers
  container.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (listState.sortKey === key) listState.sortAsc = !listState.sortAsc;
      else { listState.sortKey = key; listState.sortAsc = true; }
      renderList();
    });
  });

  document.getElementById('list-more-wrap').style.display = songs.length > listState.shown ? '' : 'none';
}

// ============================================================
// Init
// ============================================================
init();
</script>
</body>
</html>
